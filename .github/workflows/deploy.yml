name: Deploy to Moldir

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Deploy to moldir.gonzo.ink
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/lesson_schedule_assistant
            bash deploy.sh
